<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>
    

    <!-- script for dimming light for rig respawn poit to backwall-->
    <script>

      AFRAME.registerComponent('proximity-light', 
      {
        init: function () 
        {
          this.player = document.querySelector('#player');
          this.light = document.querySelector('#Light');
          this.current = 0.6; // starting dim light
        }, tick: function () 
        
        {
          const playerPos = this.player.object3D.position;
          const zonePos = this.el.object3D.position;

          const distance = playerPos.distanceTo(zonePos);

          const target = distance < 2 ? 1 : 0.2;

          this.current += (target - this.current) * 0.05;
          this.light.setAttribute('intensity', this.current); // smooth transition
        }
      });

    </script>

  <script>

    window.addEventListener('load', () => {

    let sitting = false;
    const button = document.querySelector('#Button');
    const rig = document.querySelector('#rig');

    button.addEventListener('click', ()=>{
      if(!sitting) 
      {
      rig.setAttribute('animation', {
          property: 'position', to: '0 0.6 -2.5', dur: 800, easing: 'easeInOutQuad'
        })
      } 
        else 
        {
          rig.setAttribute('animation', { property: 'position', to: '0 0 2', dur: 800, easing: 'easeInOutQuad'});
        }

        rig.setAttribute('wasd-controls', 'enabled: true');
        button.setAttribute('text', 'value:SIT');
        sitting = false;
    });
  });

</script>


  </head>

  <body>
  <a-scene fog="type: linear; color: #C2A580; near: 5; far: 10">
  <!-- assety-->
    <a-assets>
      <a-asset-item id="bench" src="bench.glb"></a-asset-item>
      <a-asset-item id="bench2" src="bench2.glb"></a-asset-item>
      <a-asset-item id="stove" src="Stove1.glb"></a-asset-item>
      <a-asset-item id="ladle" src="Ladle.glb"></a-asset-item>
      <a-asset-item id="bucket" src="Bucket.glb"></a-asset-item>
    </a-assets>

    <!-- benches along back wall (z = -8) -->
    <a-entity gltf-model="#bench" position="0 0.35 -7.3" rotation="0 0 0" scale="1.5 1.5 1.5"></a-entity>
    <a-entity gltf-model="#bench2" position="0 1.1 -6.9" rotation="0 0 0" scale="1.5 1.5 1.5"></a-entity>
    <!-- benches along side walls -->
    <a-entity gltf-model="#bench" position="-3.6 0.35 -5" rotation="0 90 0" scale="1.5 1.5 1.5"></a-entity>
    <a-entity gltf-model="#bench" position="3.6 0.35 -5" rotation="0 -90 0" scale="1.5 1.5 1.5"></a-entity>

    <!-- stove, bucket, and ladle near left-front corner -->
    <a-entity gltf-model="#stove" position="-3 0 -5.5" rotation="0 45 0" scale="0.8 0.8 0.8"></a-entity>
    <a-entity gltf-model="#bucket" position="-2.2 0 -5" rotation="0 0 0" scale="0.6 0.6 0.6"></a-entity>
    <a-entity gltf-model="#ladle" position="-2.6 0.9 -5.3" rotation="0 30 0" scale="0.4 0.4 0.4"></a-entity>

    <a-entity id = "rig" position= "0 0 2">
    <a-camera id= "player" position="0 1.6 2" wasd-controls="acceleration: 20; fly:false" look-controls>
 <a-cursor></a-cursor>

  <a-plane 
    id="Button"
    position="0 -0.5 -1"
    width="0.6"
    height="0.25"
    color="#222"
    text="value: USIaDz; align: center; color: #fff">
      </a-plane>
    </a-camera>
    </a-entity>

    <!-- do skryptu z swiatelkiem-->
      <a-light id="Light" type="point" position="0 3 -4" intensity="0.2" color="#ffffff"> </a-light>
      <a-box position="-3.3 1.05 -3" width="0.6" height="0.1" color="#000000"></a-box> //whole scene

      <a-box position="0 1 -6" width="2" height="2" depth="2" visible="false" proximity-light> </a-box> //trigger zone
  <!-- scena-->
      <a-box position="-4 2 -4" rotation="0 90 0" width ="8" height="4" depth="0.1" color="#C2A580"></a-box> //backWall
      <a-box position="4 2 -4" rotation="0 90 0" width= "8" height ="4" depth="0.1" color="#C2A580"></a-box> //right wall
      <a-plane position="0 0 -4" rotation="-90 0 0" width="8" height ="8" color="#BE9F79"></a-plane> //flooring
      <a-cylinder position="-3.3 0.3 -1" radius="0.5" height="0.5" color="#FFC65D"></a-cylinder>
      <a-box position="0 2 -8" width ="8" height="4" depth= "0.1" color="#C2A580"></a-box>
      <a-box position="-3.3 0.5 -3" color="#51E9F0"></a-box>


      <a-sky color="#000000"></a-sky>

    </a-scene>
  </body>
</html>
